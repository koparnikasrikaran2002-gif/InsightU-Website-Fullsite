<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InsightU - Login</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="globel.css">
</head>

<body>

  <!-- Page Loader -->
  <div id="page-loader">
    <div class="three-body">
      <div class="three-body__dot"></div>
      <div class="three-body__dot"></div>
      <div class="three-body__dot"></div>
    </div>
  </div>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container">
      <a class="navbar-brand brand-box" href="index.html">
        <img src="Logo 250px.png" alt="InsightU Logo" class="navbar-logo">
        InsightU
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#loginNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="loginNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="contact.html">Contact</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Login Section -->
  <section class="login-section">
    <div class="container">
      <div class="login-wrapper">
        <div class="login-card">
          <h1>Login to Your Account</h1>
          <p class="login-subtext">Please enter your credentials to access your account.</p>

          <form id="loginForm" novalidate>
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control custom-input" id="email" placeholder="Enter your email">
              <small class="error-text" id="emailError"></small>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control custom-input" id="password" placeholder="Enter your password">
              <small class="error-text" id="passwordError"></small>
            </div>

            <div class="remember-box mb-3">
              <span class="remember-label">Remember Me</span>
              <div class="radio-group">
                <label><input type="radio" name="remember" value="Yes"> Yes</label>
                <label><input type="radio" name="remember" value="No"> No</label>
              </div>
            </div>

            <div class="login-actions">
              <a href="#" class="forgot-link" id="forgotPasswordLink">Forgot Password</a>
              <button type="submit" class="login-btn">Login</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="container-fluid px-4">
      <div class="row align-items-center">
        <!-- Left: Logo & Copyright -->
        <div class="col-md-4 text-center text-md-start mb-4 mb-md-0">
          <a href="index.html" class="footer-brand d-inline-flex align-items-center mb-2">
            <img src="Logo 250px.png" alt="InsightU Logo" class="footer-logo">
          </a>
          <p class="text-muted small mb-0">&copy; 2026 InsightU. All rights reserved.</p>
        </div>

        <!-- Center: Links -->
        <div class="col-md-4 text-center mb-4 mb-md-0">
          <div class="d-flex flex-column align-items-center">
            <a href="mailto:support@insightu.edu" class="footer-link mb-2"><i
                class="bi bi-envelope-fill me-2"></i>support@insightu.edu</a>
            <a href="tel:1234567890" class="footer-link"><i class="bi bi-telephone-fill me-2"></i>(123) 456-7890</a>
          </div>
        </div>

        <!-- Right: Social Icons -->
        <div class="col-md-4">
          <p class="text-muted small text-center text-md-end mb-2 d-none d-md-block">Follow us</p>
          <div class="social-icons">
            <a href="#" class="social-icon" aria-label="Facebook"><i class="bi bi-facebook"></i></a>
            <a href="#" class="social-icon" aria-label="Twitter"><i class="bi bi-twitter-x"></i></a>
            <a href="#" class="social-icon" aria-label="Instagram"><i class="bi bi-instagram"></i></a>
            <a href="#" class="social-icon" aria-label="LinkedIn"><i class="bi bi-linkedin"></i></a>
          </div>
        </div>
      </div>
      <div class="row mt-3">
        <div class="col-12 text-center text-md-start">
          <span class="text-muted small signup-text">Don't have an account? <a href="signup.html"
              class="footer-link fw-bold">Sign Up</a>.</span>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>window.addEventListener('load', function () { document.getElementById('page-loader').classList.add('hidden'); });</script>
  <script src="login.js"></script>
</body>

</html>
